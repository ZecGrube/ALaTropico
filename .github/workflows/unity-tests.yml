name: Unity Tests & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Unity Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: src/Library
          key: Library-src-${{ hashFiles('src/Packages/manifest.json') }}
          restore-keys: |
            Library-src-

      - name: Run All Tests with Coverage
        uses: game-ci/unity-test-runner@v2
        id: unityTests
        with:
          projectPath: src
          testMode: all
          artifactsPath: artifacts
          coverageOptions: 'generateHtmlReport;generateCoberturaReport;generateBadgeReport'

      - name: Verify Critical Module Coverage
        uses: game-ci/unity-builder@v2
        with:
          projectPath: src
          buildMethod: CaudilloBay.Editor.CoverageGuard.RunGuard
          customParameters: -coverageReportPath artifacts/CodeCoverage/CaudilloBay-opencov/Cobertura.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: Test Results
          path: artifacts

      - name: Publish Coverage Report
        uses: 5monkeys/cobertura-action@master
        with:
          path: artifacts/CodeCoverage/CaudilloBay-opencov/Cobertura.xml
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          minimum_coverage: 70
          fail_below_threshold: true
